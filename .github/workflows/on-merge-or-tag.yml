name: Create Pre-Release
on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"

env:
  API_URL: https://api.github.com/repos/${{ github.repository }}
  TOKEN: ${{ secrets.EDFI_BUILD_AGENT_PAT }}

permissions:
  contents: read
 
jobs:
  create-pre-releases:
    name: Create Pre-Releases
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Check package version changed
        id: version-check
        run: |
          $currentVersion = (Get-Content package.json | ConvertFrom-Json).version
          $previousVersion = ""

          if ("${{ github.event.before }}" -notmatch "^0+$") {
            $previousPackageJson = git show "${{ github.event.before }}:package.json"
            $previousVersion = ($previousPackageJson | ConvertFrom-Json).version
          }

          "version=$currentVersion" >> $env:GITHUB_OUTPUT

          if ($previousVersion -eq $currentVersion) {
            "Package version did not change; skipping pre-release." | Write-Output
            "version-changed=false" >> $env:GITHUB_OUTPUT
          } else {
            "Package version changed from '$previousVersion' to '$currentVersion'." | Write-Output
            "version-changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Create vscode-metaed Pre-Release
        if: steps.version-check.outputs.version-changed == 'true'
        run: |
          $version = "${{ steps.version-check.outputs.version }}"

          $body = @{
            tag_name = $version
            target_commitish = "main"
            name = $version
            body = ""
            draft = $false
            prerelease = $true
            generate_release_notes = $false
          } | ConvertTo-Json

          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer ${{ env.TOKEN }}"
          }

          Invoke-RestMethod -Method POST -Uri ${{ env.API_URL }}/releases -Body $body -Headers $headers
